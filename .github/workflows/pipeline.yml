name: Simple Docker Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Docker Info
      run: docker info

    - name: List Contents
      run: |
        echo "Repository contents:"
        ls -la
        echo "Directory tree:"
        find . -type f -name "*" | head -30

    - name: Try Simple Build
      run: |
        # Попытка найти любой Dockerfile
        dockerfiles=$(find . -name "Dockerfile*" -type f | head -5)
        if [ -z "$dockerfiles" ]; then
            echo "No Dockerfiles found"
            exit 1
        fi

        # Попытка собрать первый найденный Dockerfile
        dockerfile=$(echo "$dockerfiles" | head -1)
        echo "Using Dockerfile: $dockerfile"
        docker build -f $dockerfile -t devops-test:latest .

    - name: Test Build
      run: |
        # Проверка, что образ создан
        if ! docker images | grep -q "devops-test"; then
            echo "Image not built"
            exit 1
        fi

        # Попытка запустить контейнер
        echo "Starting container..."
        docker run --rm -d -p 8080:80 devops-test:latest

        # Проверка статуса
        sleep 5
        container_id=$(docker ps -q --filter ancestor=devops-test:latest)
        if [ -z "$container_id" ]; then
            echo "Container not running"
            exit 1
        fi

        # Проверка порта
        if ! docker port $container_id | grep -q "80/tcp"; then
            echo "Port 80 not exposed"
            exit 1
        fi

        # Тестирование доступности
        echo "Testing container..."
        if curl -f http://localhost:8080; then
            echo "Container working"
        else
            echo "Container not responding"
            exit 1
        fi

        # Остановка
        docker stop $container_id

    - name: Alternative Test
      run: |
        # Попытка использовать готовый образ
        echo "Trying nginx:alpine..."
        docker run --rm -d -p 8080:80 nginx:alpine
        sleep 10
        if curl -f http://localhost:8080; then
            echo "Nginx working"
        else
            echo "Nginx not working"
        fi
        docker stop $(docker ps -q)

    - name: Cleanup
      run: docker system prune -f
