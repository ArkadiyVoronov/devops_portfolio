name: Simple Docker Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Docker Info
      run: docker info

    - name: Build Web Image
      run: |
        cd docker/web
        docker build -t devops-web:latest .

    - name: Build Database Image
      run: |
        cd docker/database
        docker build -t devops-db:latest .

    - name: Test Images
      run: |
        # Запуск веб-сервера
        docker run --rm -d -p 8080:80 devops-web:latest
        sleep 10
        curl -f http://localhost:8080 || (echo "Web test failed" && exit 1)
        docker stop $(docker ps -q)

        # Запуск базы данных
        docker run --rm -d -p 5432:5432 devops-db:latest
        sleep 10
        docker exec -i $(docker ps -lq) psql -U devops -d devops_db -c '\l' || (echo "DB test failed" && exit 1)
        docker stop $(docker ps -q)

    - name: Docker Images List
      run: docker images | grep devops

    - name: Cleanup
      run: docker system prune -f
