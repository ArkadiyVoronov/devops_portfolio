name: Docker Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Docker Setup Buildx
      uses: docker/setup-buildx-action@v3
      with:
        buildkitd-flags: --allow insecure-entitlement=security.insecure

    - name: Docker Build Web Image
      uses: docker/build-push-action@v4
      with:
        context: ./docker/web/
        file: ./docker/web/Dockerfile
        push: false
        tags: devops-web:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64

    - name: Docker Build Database Image
      uses: docker/build-push-action@v4
      with:
        context: ./docker/database/
        file: ./docker/database/Dockerfile
        push: false
        tags: devops-db:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64

    - name: Docker Info
      run: docker info

    - name: Buildx Version
      run: docker buildx version

    - name: Proxy Configuration
      run: printenv | grep -i proxy

    - name: Docker Images List
      run: docker images

    - name: Test Build
      run: |
        docker run --rm -d -p 8080:80 devops-web:latest
        sleep 10
        curl -f http://localhost:8080
        docker stop $(docker ps -q)
