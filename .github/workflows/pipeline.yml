# .github/workflows/pipeline.yml (оптимизированный)
name: DevOps Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and export Docker images
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./docker/web/Dockerfile
        push: false
        tags: devops-web:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Test Docker image
      run: |
        docker run --rm -d -p 8080:80 devops-web:latest
        sleep 10
        curl -f http://localhost:8080
        docker stop $(docker ps -q)

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v3

    - name: Run unit tests
      run: |
        python -m pytest tests/unit/ -v --cov=ansible --cov=docker

    - name: Run integration tests
      run: |
        python -m pytest tests/integration/ -v --cov=ansible --cov=docker

    - name: Upload coverage
      uses: codecov/codecov-action@v3
