# Исправление ошибки контейнера

## Анализ ошибки

**Ошибка:** `exec: "nginx": executable file not found in $PATH`

**Причина:** Образ `devops-test:latest` не содержит nginx или имеет неправильную конфигурацию.

## Исправленный подход

<details>
<summary> <strong>Модифицированный workflow</strong> </summary>

```yaml
name: Simple Docker Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Docker Info
      run: docker info

    - name: List Contents
      run: |
        echo "Repository contents:"
        ls -la
        echo "Directory tree:"
        find . -type f -name "*" | head -30

    - name: Try Simple Build
      run: |
        # Попытка найти любой Dockerfile
        dockerfiles=$(find . -name "Dockerfile*" -type f | head -5)
        if [ -z "$dockerfiles" ]; then
            echo "No Dockerfiles found"
            exit 1
        fi

        # Попытка собрать первый найденный Dockerfile
        dockerfile=$(echo "$dockerfiles" | head -1)
        echo "Using Dockerfile: $dockerfile"
        docker build -f $dockerfile -t devops-test:latest .

    - name: Test Build
      run: |
        # Проверка, что образ создан
        if ! docker images | grep -q "devops-test"; then
            echo "Image not built"
            exit 1
        fi

        # Попытка запустить контейнер
        echo "Starting container..."
        docker run --rm -d -p 8080:80 devops-test:latest

        # Проверка статуса
        sleep 5
        container_id=$(docker ps -q --filter ancestor=devops-test:latest)
        if [ -z "$container_id" ]; then
            echo "Container not running"
            exit 1
        fi

        # Проверка порта
        if ! docker port $container_id | grep -q "80/tcp"; then
            echo "Port 80 not exposed"
            exit 1
        fi

        # Тестирование доступности
        echo "Testing container..."
        if curl -f http://localhost:8080; then
            echo "Container working"
        else
            echo "Container not responding"
            exit 1
        fi

        # Остановка
        docker stop $container_id

    - name: Alternative Test
      run: |
        # Попытка использовать готовый образ
        echo "Trying nginx:alpine..."
        docker run --rm -d -p 8080:80 nginx:alpine
        sleep 10
        if curl -f http://localhost:8080; then
            echo "Nginx working"
        else
            echo "Nginx not working"
        fi
        docker stop $(docker ps -q)

    - name: Cleanup
      run: docker system prune -f
```
</details>

## Альтернативные решения

<details>
<summary> <strong>Другие варианты</strong> </summary>

```bash
# Вариант 1: Использование готовых образов
docker run --rm -d -p 8080:80 nginx:alpine
docker run --rm -d -p 5432:5432 postgres:13-alpine

# Вариант 2: Проверка существующих образов
docker images | grep -E "(nginx|postgres|alpine)"

# Вариант 3: Создание простого образа
echo "FROM alpine" > Dockerfile
echo "RUN apk add --no-cache nginx" >> Dockerfile
echo "EXPOSE 80" >> Dockerfile
echo "CMD nginx -g 'daemon off;'" >> Dockerfile
docker build -t devops-simple:latest .
```

**Проверки:**
```bash
# Проверка nginx в системе
if command -v nginx &> /dev/null; then
    echo "Nginx installed"
else
    echo "Nginx not installed"
fi

# Проверка alpine
docker run --rm alpine echo "Alpine works"
```
</details>

## Возможные проблемы

1. **Отсутствие nginx** в образе
2. **Неправильный ENTRYPOINT/CMD** в Dockerfile
3. **Отсутствие необходимых пакетов** в alpine
4. **Неправильная структура** репозитория

## Рекомендации

1. **Используйте готовые образы** (nginx:alpine, postgres:13-alpine)
2. **Проверьте структуру репозитория** с помощью диагностического скрипта
3. **Попробуйте альтернативные подходы** из workflow
4. **Убедитесь, что Docker работает** корректно

Если проблема сохраняется, предоставьте вывод диагностического скрипта для дальнейшей помощи.
